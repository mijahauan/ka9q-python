<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radiod Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📻 radiod Control Panel</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="radiod-select">radiod Instance:</label>
                    <select id="radiod-select" disabled>
                        <option value="">Discovering...</option>
                    </select>
                    <button id="refresh-btn" class="btn btn-small">🔄 Refresh</button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main>
            <!-- Left Sidebar: Channel List -->
            <aside class="sidebar">
                <h2>Channels</h2>
                <div id="channel-list" class="channel-list">
                    <div class="empty-state">
                        <p>Select a radiod instance to view channels</p>
                    </div>
                </div>
            </aside>

            <!-- Right Panel: Channel Details -->
            <section class="detail-panel">
                <div id="channel-detail" class="channel-detail">
                    <div class="empty-state">
                        <h2>No Channel Selected</h2>
                        <p>Select a channel from the list to view details</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Status Bar -->
        <footer>
            <div id="status-bar" class="status-bar">
                Ready
            </div>
        </footer>
    </div>

    <!-- Channel Detail Template -->
    <template id="channel-detail-template">
        <div class="detail-header">
            <h2>Channel <span class="ssrc-value"></span></h2>
            <div class="header-controls">
                <button class="btn btn-small edit-mode-btn">✏️ Edit</button>
                <button class="btn btn-small close-btn">✕ Close</button>
            </div>
        </div>
        
        <div class="detail-content">
            <!-- 4-column grid layout -->
            <div class="sections-grid">
                <!-- Column 1: Tuning -->
                <div class="section">
                    <h3>Tuning</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>Frequency:</label>
                            <span class="value freq-value"></span>
                            <input type="number" class="edit-control freq-input" step="0.000001" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label>Mode:</label>
                            <span class="value preset-value"></span>
                            <select class="edit-control preset-input" style="display:none;">
                                <option value="iq">IQ</option>
                                <option value="usb">USB</option>
                                <option value="lsb">LSB</option>
                                <option value="am">AM</option>
                                <option value="fm">FM</option>
                                <option value="cw">CW</option>
                            </select>
                        </div>
                        <div class="info-item">
                            <label>SSRC:</label>
                            <span class="value ssrc-detail-value"></span>
                        </div>
                    </div>
                </div>

                <!-- Column 2: Filter -->
                <div class="section">
                    <h3>Filter</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>Low Edge:</label>
                            <span class="value low-edge-value"></span>
                            <input type="number" class="edit-control low-edge-input" step="100" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label>High Edge:</label>
                            <span class="value high-edge-value"></span>
                            <input type="number" class="edit-control high-edge-input" step="100" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label>Bandwidth:</label>
                            <span class="value bandwidth-value"></span>
                        </div>
                        <div class="info-item">
                            <label title="Kaiser window shaping parameter">Kaiser β:</label>
                            <span class="value kaiser-beta-value"></span>
                            <input type="number" class="edit-control kaiser-beta-input" step="0.1" min="0" max="20" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label title="FFT block size">FFT Size:</label>
                            <span class="value filter-blocksize-value"></span>
                        </div>
                        <div class="info-item">
                            <label title="FIR filter length">FIR Length:</label>
                            <span class="value filter-fir-length-value"></span>
                        </div>
                    </div>
                </div>

                <!-- Column 3: Output -->
                <div class="section">
                    <h3>Output</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>Sample Rate:</label>
                            <span class="value samprate-value"></span>
                            <input type="number" class="edit-control samprate-input" step="1000" style="display:none;">
                        </div>
                        <div class="info-item edit-only" style="display:none;">
                            <label>Channels:</label>
                            <select class="edit-control channels-input">
                                <option value="1">Mono</option>
                                <option value="2">Stereo</option>
                            </select>
                        </div>
                        <div class="info-item edit-only" style="display:none;">
                            <label>Output Level:</label>
                            <input type="number" class="edit-control output-level-input" step="0.1" value="0">
                        </div>
                        <div class="info-item">
                            <label>Encoding:</label>
                            <span class="value encoding-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Destination:</label>
                            <span class="value destination-value"></span>
                        </div>
                    </div>
                </div>

                <!-- Column 4: Signal -->
                <div class="section">
                    <h3>Signal</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>SNR:</label>
                            <span class="value snr-value"></span>
                        </div>
                        <div class="info-item">
                            <label>BB Power:</label>
                            <span class="value baseband-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Noise:</label>
                            <span class="value noise-value"></span>
                        </div>
                        <div class="info-item">
                            <label>IF Power:</label>
                            <span class="value if-power-value"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Second row: Additional sections grid -->
            <div class="sections-grid">
                <!-- Demodulation -->
                <div class="section">
                    <h3>Demodulation</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>Type:</label>
                            <span class="value demod-type-value"></span>
                        </div>
                        <div class="info-item">
                            <label>PLL Enable:</label>
                            <span class="value pll-status-value"></span>
                            <input type="checkbox" class="edit-control pll-enable-input" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label title="PLL bandwidth">PLL BW:</label>
                            <span class="value pll-bw-value"></span>
                            <input type="number" class="edit-control pll-bw-input" step="1" style="display:none;">
                        </div>
                        <div class="info-item edit-only" style="display:none;">
                            <label>PLL Square:</label>
                            <input type="checkbox" class="edit-control pll-square-input">
                        </div>
                        <div class="info-item">
                            <label title="Squelch open threshold">Squelch Open:</label>
                            <span class="value squelch-value"></span>
                            <input type="number" class="edit-control squelch-open-input" step="0.5" style="display:none;">
                        </div>
                        <div class="info-item edit-only" style="display:none;">
                            <label>Squelch Close:</label>
                            <input type="number" class="edit-control squelch-close-input" step="0.5">
                        </div>
                        <div class="info-item edit-only" style="display:none;">
                            <label>SNR Squelch:</label>
                            <input type="checkbox" class="edit-control snr-squelch-input">
                        </div>
                    </div>
                </div>

                <!-- LO Frequencies -->
                <div class="section">
                    <h3>LO Frequencies</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>1st LO:</label>
                            <span class="value first-lo-value"></span>
                        </div>
                        <div class="info-item">
                            <label>2nd LO:</label>
                            <span class="value second-lo-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Shift:</label>
                            <span class="value shift-freq-value"></span>
                            <input type="number" class="edit-control shift-input" step="100" style="display:none;">
                        </div>
                        <div class="info-item">
                            <label>Doppler:</label>
                            <span class="value doppler-freq-value"></span>
                        </div>
                    </div>
                </div>

                <!-- Hardware -->
                <div class="section">
                    <h3>Hardware</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>LNA Gain:</label>
                            <span class="value lna-gain-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Mixer Gain:</label>
                            <span class="value mixer-gain-value"></span>
                        </div>
                        <div class="info-item">
                            <label>IF Gain:</label>
                            <span class="value if-gain-value"></span>
                        </div>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="section">
                    <h3>Statistics</h3>
                    <div class="info-list">
                        <div class="info-item">
                            <label>Data Pkts:</label>
                            <span class="value data-packets-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Meta Pkts:</label>
                            <span class="value meta-packets-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Errors:</label>
                            <span class="value output-errors-value"></span>
                        </div>
                        <div class="info-item">
                            <label>Drops:</label>
                            <span class="value filter-drops-value"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Third row: Gain & AGC (spans full width) -->
            <div class="section section-full">
                <h3>Gain & AGC</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label>AGC:</label>
                        <span class="value agc-value"></span>
                        <input type="checkbox" class="edit-control agc-enable-input" style="display:none;">
                    </div>
                    <div class="info-item">
                        <label>Channel Gain:</label>
                        <span class="value gain-value"></span>
                        <input type="number" class="edit-control gain-input" step="0.5" style="display:none;">
                    </div>
                    <div class="info-item">
                        <label title="AGC headroom">Headroom:</label>
                        <span class="value headroom-value"></span>
                        <input type="number" class="edit-control headroom-input" step="0.5" style="display:none;">
                    </div>
                    <div class="info-item">
                        <label title="AGC hang time">Hang Time:</label>
                        <span class="value agc-hangtime-value"></span>
                        <input type="number" class="edit-control hangtime-input" step="0.1" style="display:none;">
                    </div>
                    <div class="info-item">
                        <label title="AGC recovery rate">Recovery:</label>
                        <span class="value agc-recovery-value"></span>
                        <input type="number" class="edit-control recovery-input" step="0.1" style="display:none;">
                    </div>
                    <div class="info-item">
                        <label>RF Gain:</label>
                        <span class="value rf-gain-value"></span>
                    </div>
                    <div class="info-item">
                        <label>RF Atten:</label>
                        <span class="value rf-atten-value"></span>
                    </div>
                    <div class="info-item">
                        <label>RF AGC:</label>
                        <span class="value rf-agc-value"></span>
                    </div>
                </div>
            </div>

            <!-- Advanced Controls (Edit Mode Only) -->
            <div class="section section-full edit-only" style="display:none;">
                <h3>Advanced Controls</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Independent Sideband:</label>
                        <input type="checkbox" class="edit-control isb-input">
                    </div>
                    <div class="info-item">
                        <label>Envelope Detection:</label>
                        <input type="checkbox" class="edit-control envelope-input">
                    </div>
                    <div class="info-item">
                        <label>Opus Bitrate (bps):</label>
                        <input type="number" class="edit-control opus-bitrate-input" step="1000" value="32000">
                    </div>
                </div>
            </div>

            <!-- Control Buttons (Edit Mode Only) -->
            <div class="control-buttons edit-only" style="display:none;">
                <button class="btn btn-primary apply-btn">✓ Apply Changes</button>
                <button class="btn btn-secondary reset-btn">↺ Reset</button>
            </div>

            <!-- Auto-refresh indicator -->
            <div class="refresh-indicator">
                <span class="refresh-dot"></span>
                <span class="refresh-text">Auto-refreshing every 1s</span>
            </div>
        </div>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
